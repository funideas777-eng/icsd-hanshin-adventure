<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A237E">
  <link rel="manifest" href="manifest.json">
  <title>排行榜 - ICSD × 漢神洲際冒險</title>
  <link rel="stylesheet" href="css/common.css?v=icsd3">
  <style>
    .score-hero { position:relative; height:160px; margin:0 -16px 12px; background:#050b22 center/cover no-repeat url('assets/images/misc/scoreboard-hero.jpg'); border-radius:0 0 18px 18px; overflow:hidden; }
    .score-hero::after { content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(5,11,34,0.2) 0%, rgba(5,11,34,0.85) 100%); }
    .score-hero-text { position:absolute; left:0; right:0; bottom:14px; text-align:center; z-index:1; }
    .score-hero-text h1 { font-size:22px; color:#FFD740; font-weight:900; letter-spacing:2px; text-shadow:0 2px 12px rgba(0,0,0,0.65); }
    .score-hero-text p { font-size:12px; color:rgba(255,255,255,0.85); margin-top:2px; letter-spacing:1px; }
    .score-header { display:none; }
    .score-tabs { display:flex; margin:0 0 16px; }
    .score-tab { flex:1; padding:12px; text-align:center; font-size:14px; font-weight:600; border:none; background:rgba(255,255,255,0.06); color:var(--text-light); cursor:pointer; }
    .score-tab:first-child { border-radius:10px 0 0 10px; }
    .score-tab:last-child { border-radius:0 10px 10px 0; }
    .score-tab.active { background:var(--primary); color:white; }
    #gameSelector { display:none; margin-bottom:12px; }
    .game-chips { display:flex; gap:6px; flex-wrap:wrap; }
    .game-chip { padding:5px 12px; border-radius:16px; border:2px solid rgba(0,188,212,0.2); font-size:12px; background:rgba(255,255,255,0.05); color:var(--text); cursor:pointer; white-space:nowrap; }
    .game-chip.active { border-color:var(--primary); background:rgba(233,30,99,0.15); color:white; }
  </style>
</head>
<body>
<div class="top-bar"><button class="top-bar-back" onclick="window.location.href='map.html'">←</button><div class="top-bar-title">🏆 即時戰報</div><div style="width:40px;"></div></div>
<div class="page-container">
  <div class="score-hero">
    <div class="score-hero-text"><h1>🏆 即時積分戰報</h1><p>ICSD × 漢神洲際 · 每 5 分鐘自動更新 · 前 5 名加分</p></div>
  </div>
  <div class="medals-banner" style="margin:0 -16px 14px; padding:8px 16px; background:linear-gradient(180deg, rgba(255,179,0,0.10), rgba(5,11,34,0)); border-bottom:1px solid rgba(255,179,0,0.25);">
    <div style="font-size:11px; color:#FFD740; font-weight:800; letter-spacing:2px; text-align:center; margin-bottom:6px;">🥇 ICSD × 漢神 冠軍勳章 🥈🥉</div>
    <img src="assets/images/medals/medals.jpg" alt="完賽勳章 Top1 / Top2 / Top3 / 全勤 / 隊魂" style="width:100%; max-height:120px; object-fit:cover; border-radius:10px; border:1px solid rgba(255,179,0,0.32); box-shadow:0 4px 14px rgba(0,0,0,0.4);" loading="lazy">
  </div>
  <div style="text-align:center;margin-bottom:12px;"><button class="btn btn-secondary btn-sm" id="refreshBtn" onclick="ScoreboardEngine.manualRefresh()">🔄 刷新排行榜</button></div>
  <div class="score-tabs"><button class="score-tab active" data-tab="team" onclick="ScoreboardEngine.switchTab('team')">🏆 團隊排行</button><button class="score-tab" data-tab="game" onclick="ScoreboardEngine.switchTab('game')">🎮 遊戲排行</button></div>
  <div id="gameSelector"><div class="game-chips" id="gameChips"></div></div>
  <div id="rankingList"></div>
  <div style="text-align:center;font-size:11px;color:rgba(0,188,212,0.4);padding:8px;">⏱ 每 5 分鐘自動更新 · 手動刷新冷卻 1 分鐘</div>
</div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/audio.js"></script><script src="js/scoreboard-engine.js"></script>
<script>
  if (!Auth.requireLogin()) throw new Error('未登入');
  AudioEngine.init(); API.init();
  document.getElementById('gameChips').innerHTML = CONFIG.GAMES.map(g => `<div class="game-chip${g.id==='pacman'?' active':''}" onclick="selectChip(this,'${g.id}')">${g.icon} ${g.name}</div>`).join('');
  function selectChip(el, id) { document.querySelectorAll('.game-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); ScoreboardEngine.selectGame(id); }
  ScoreboardEngine.init();
</script>
<script src="js/sw-manager.js"></script>
</body>
</html>
