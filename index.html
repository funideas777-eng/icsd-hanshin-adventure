<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1A237E">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>ICSD × 漢神洲際冒險</title>
  <link rel="stylesheet" href="css/common.css?v=icsd2">
  <style>
    .login-page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; background:#050b22 center/cover no-repeat; position:relative; overflow:hidden; }
    .login-page::after { content:""; position:absolute; inset:0; background:url('assets/images/cover/hero.jpg') center/cover no-repeat; opacity:0.45; pointer-events:none; z-index:0; }
    .login-page::before { content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(5,11,34,0.55) 0%, rgba(5,11,34,0.85) 60%, rgba(5,11,34,0.95) 100%); pointer-events:none; z-index:0; }
    /* 晶圓晶格背景（金色格線） */
    .login-grid { position:absolute; top:0;left:0;right:0;bottom:0; background-image:
      linear-gradient(rgba(255,179,0,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,179,0,0.08) 1px, transparent 1px);
      background-size:40px 40px; pointer-events:none; animation:gridScroll 20s linear infinite; }
    @keyframes gridScroll { from{transform:translate(0,0)} to{transform:translate(40px,40px)} }
    .login-particles { position:absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; overflow:hidden; }
    .login-particle { position:absolute; width:3px; height:3px; background:#FFB300; border-radius:50%; opacity:0; animation:particleFloat 6s ease-in-out infinite; box-shadow:0 0 8px #FFB300; }
    @keyframes particleFloat { 0%{opacity:0;transform:translateY(100vh)} 20%{opacity:0.85} 80%{opacity:0.85} 100%{opacity:0;transform:translateY(-20px)} }
    /* 寶山藍光暈 */
    .login-glow-top { position:absolute; top:-100px; left:50%; transform:translateX(-50%); width:420px; height:300px; background:radial-gradient(ellipse, rgba(26,35,126,0.45), transparent 70%); pointer-events:none; }
    /* 漢神金光暈 */
    .login-glow-bot { position:absolute; bottom:-80px; left:50%; transform:translateX(-50%); width:420px; height:260px; background:radial-gradient(ellipse, rgba(255,179,0,0.28), transparent 70%); pointer-events:none; }
    .login-card { width:100%; max-width:380px; background:rgba(8,15,42,0.88); border:1px solid rgba(255,179,0,0.28); border-radius:24px; padding:36px 28px; box-shadow:0 0 40px rgba(255,179,0,0.18), 0 20px 60px rgba(0,0,0,0.55); position:relative; z-index:1; animation:fadeIn 0.6s ease; backdrop-filter:blur(20px); }
    .login-badge { text-align:center; margin-bottom:12px; }
    .login-badge-text { display:inline-block; font-size:11px; font-weight:900; color:#1A237E; letter-spacing:3px; text-transform:uppercase; padding:6px 16px; background:linear-gradient(135deg,#FFB300,#FFD740); border-radius:20px; box-shadow:0 2px 10px rgba(255,179,0,0.45); }
    .login-logo { text-align:center; margin-bottom:8px; }
    .login-logo-icon { font-size:64px; display:block; margin-bottom:8px; filter:drop-shadow(0 0 20px rgba(255,179,0,0.55)); }
    .login-title { text-align:center; font-size:22px; font-weight:900; color:#fff; margin-bottom:4px; letter-spacing:1.5px; text-shadow:0 0 20px rgba(255,179,0,0.45); }
    .login-subtitle { text-align:center; font-size:13px; color:#FFB300; margin-bottom:6px; letter-spacing:2px; }
    .login-welcome { text-align:center; font-size:12px; color:rgba(255,255,255,0.6); margin-bottom:18px; line-height:1.7; }
    .login-welcome strong { color:#FFD740; font-weight:800; }
    .login-leader { text-align:center; margin-bottom:18px; padding:10px; background:linear-gradient(135deg, rgba(26,35,126,0.55), rgba(255,179,0,0.15)); border:1px solid rgba(255,179,0,0.32); border-radius:12px; }
    .login-leader-tag { font-size:10px; color:#FFD740; letter-spacing:2px; font-weight:800; }
    .login-leader-name { font-size:15px; color:#fff; font-weight:900; margin-top:2px; }
    .login-leader-nick { font-size:11px; color:#FFB300; margin-top:1px; font-style:italic; }
    .team-preview { margin-top:12px; padding:16px; background:linear-gradient(135deg,rgba(26,35,126,0.55),rgba(255,179,0,0.18)); border:1px solid rgba(255,179,0,0.35); border-radius:var(--radius); color:white; text-align:center; display:none; }
    .team-preview.show { display:block; animation:fadeIn 0.3s ease; }
    .login-footer { text-align:center; margin-top:20px; font-size:11px; color:rgba(255,179,0,0.55); position:relative; z-index:1; letter-spacing:1.5px; }
    .login-divider { width:60px; height:2px; background:linear-gradient(90deg,transparent,#FFB300,transparent); margin:14px auto; }
    .login-event-meta { text-align:center; font-size:11px; color:rgba(255,255,255,0.55); margin-bottom:8px; letter-spacing:1px; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-grid"></div>
  <div class="login-particles" id="particles"></div>
  <div class="login-glow-top"></div>
  <div class="login-glow-bot"></div>
  <div class="login-card">
    <div class="login-badge"><span class="login-badge-text">TSMC ICSD</span></div>
    <div class="login-logo"><span class="login-logo-icon">💎</span></div>
    <h1 class="login-title">ICSD × 漢神洲際冒險</h1>
    <p class="login-subtitle">Hanshin Adventure</p>
    <div class="login-event-meta">📅 2026/5/29 (五) · 13:00-18:00 · 台中漢神洲際</div>
    <div class="login-divider"></div>
    <div class="login-leader">
      <div class="login-leader-tag">🎯 領隊主管</div>
      <div class="login-leader-name">Simon · 寶山玄彬</div>
      <div class="login-leader-nick">「帥氣與才華並重的寶山男神」</div>
    </div>
    <div class="login-welcome">歡迎加入 <strong>TSMC ICSD</strong> 部門年度團建<br>跟著 <strong>寶山玄彬</strong> 一起闖蕩漢神洲際 7 層樓！</div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group"><label class="form-label">你的姓名</label><input type="text" class="input" id="playerName" placeholder="請輸入姓名" required maxlength="20" autocomplete="off"></div>
      <div class="form-group"><label class="form-label">選擇你的隊伍（30組）</label><select class="select" id="teamSelect" required onchange="showTeamPreview()"><option value="">-- 請選擇隊伍 --</option></select></div>
      <div class="team-preview" id="teamPreview"><div id="previewEmoji" style="font-size:48px"></div><div id="previewName" style="font-size:20px;font-weight:700;margin-top:4px"></div><div id="previewNumber" style="font-size:13px;opacity:0.85"></div></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn" style="margin-top:24px;">🚀 加入冒險</button>
    </form>
  </div>
  <p class="login-footer">TSMC ICSD · 漢神洲際購物廣場 · B1~6F 全館闖關</p>
</div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/audio.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'map.html';
  const select = document.getElementById('teamSelect');
  CONFIG.TEAMS.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = `第${t.id}組 ${t.emoji} ${t.name}`; select.appendChild(o); });
  const particlesEl = document.getElementById('particles');
  for (let i = 0; i < 24; i++) { const p = document.createElement('div'); p.className = 'login-particle'; p.style.left = Math.random()*100+'%'; p.style.animationDelay = Math.random()*6+'s'; p.style.animationDuration = (4+Math.random()*4)+'s'; particlesEl.appendChild(p); }
  function showTeamPreview() { const id = parseInt(select.value); const p = document.getElementById('teamPreview'); if (!id) { p.classList.remove('show'); return; } const t = getTeamById(id); document.getElementById('previewEmoji').textContent = t.emoji; document.getElementById('previewName').textContent = t.name; document.getElementById('previewNumber').textContent = `第 ${t.id} 組 · 每組 10 人`; p.classList.add('show'); AudioEngine.init(); AudioEngine.tapButton(); }
  async function handleLogin(e) { e.preventDefault(); const name = document.getElementById('playerName').value.trim(), teamId = document.getElementById('teamSelect').value; if (!name) { alert('請輸入姓名'); return false; } if (!teamId) { alert('請選擇隊伍'); return false; } const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.textContent = '加入中...'; try { AudioEngine.init(); AudioEngine.unlockGame(); API.init(); await Auth.register(name, teamId); window.location.href = 'map.html'; } catch { window.location.href = 'map.html'; } return false; }
</script>
<script src="js/sw-manager.js"></script>
<script>
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; showInstallBanner(); });
  function showInstallBanner() { if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) return; const b = document.createElement('div'); b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#0e1862;color:#fff;padding:16px 20px;box-shadow:0 -4px 20px rgba(255,179,0,0.25);z-index:999;display:flex;align-items:center;gap:12px;border-radius:16px 16px 0 0;border-top:2px solid #FFB300;'; b.innerHTML = `<div style="font-size:32px">📲</div><div style="flex:1"><div style="font-weight:800;font-size:14px">加到主畫面</div><div style="font-size:12px;color:#FFD740">像 App 一樣快速開啟</div></div><button onclick="installApp()" style="background:linear-gradient(135deg,#FFB300,#FF8F00);color:#1A237E;border:none;border-radius:10px;padding:10px 18px;font-weight:900;font-size:13px;cursor:pointer">安裝</button><button onclick="this.parentElement.remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#FFB300">✕</button>`; document.body.appendChild(b); }
  async function installApp() { if (!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent), isStandalone = window.navigator.standalone || window.matchMedia('(display-mode:standalone)').matches;
  if (isIOS && !isStandalone) { setTimeout(() => { if (localStorage.getItem('ios-tip-dismissed')) return; const t = document.createElement('div'); t.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#0e1862;color:#fff;padding:20px;box-shadow:0 -4px 20px rgba(255,179,0,0.3);z-index:9999;border-radius:20px 20px 0 0;text-align:center;border-top:2px solid #FFB300;'; t.innerHTML = `<div style="font-size:36px;margin-bottom:8px">📲</div><div style="font-weight:800;font-size:16px;margin-bottom:16px">加到主畫面</div><div style="display:flex;gap:12px;margin-bottom:16px;"><div style="flex:1;background:rgba(255,179,0,0.12);border-radius:12px;padding:12px 8px;"><div style="font-size:28px">⬆️</div><div style="font-size:11px;color:#FFD740">點擊分享</div></div><div style="flex:1;background:rgba(255,179,0,0.12);border-radius:12px;padding:12px 8px;"><div style="font-size:28px">➕</div><div style="font-size:11px;color:#FFD740">加入主畫面</div></div><div style="flex:1;background:rgba(255,179,0,0.12);border-radius:12px;padding:12px 8px;"><div style="font-size:28px">✅</div><div style="font-size:11px;color:#FFD740">完成</div></div></div><button onclick="this.parentElement.remove();localStorage.setItem('ios-tip-dismissed','1')" style="background:none;border:1px solid #FFB300;border-radius:10px;padding:10px 24px;cursor:pointer;font-size:13px;color:#FFD740">知道了</button>`; document.body.appendChild(t); }, 2000); }
</script>
</body>
</html>
